class_name: WpunitTester
bootstrap: _bootstrap.php
modules:
    enabled:
        - WPLoader
        - "\\Helper\\Wpunit"
    config:
        WPLoader:
            wpRootFolder: "%WP_ROOT_FOLDER%"
            dbName: "%WP_TEST_DB_NAME%"
            dbHost: "%WP_TEST_DB_HOST%"
            dbUser: "%WP_TEST_DB_USER%"
            dbPassword: "%WP_TEST_DB_PASSWORD%"
            tablePrefix: test_
            domain: "%WP_DOMAIN%"
            adminEmail: admin@workos.test
            title: "WorkOS Identity Tests"
            plugins:
                - workos/workos.php
            activatePlugins:
                - workos/workos.php
