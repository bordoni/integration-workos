actor: Tester
bootstrap: _bootstrap.php
paths:
    tests: tests
    output: tests/_output
    data: tests/_data
    support: tests/_support
settings:
    colors: true
    memory_limit: 1024M
params:
    - .env.testing.slic
extensions:
    enabled:
        - "lucatume\\WPBrowser\\Extension\\EventDispatcherBridge"
    commands:
        - "lucatume\\WPBrowser\\Command\\RunOriginal"
        - "lucatume\\WPBrowser\\Command\\GenerateWPUnit"
