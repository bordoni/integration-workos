name: Generate Zip

on:
  workflow_dispatch:
    inputs:
      production:
        description: 'Is this a production build?'
        default: false
        type: boolean
  workflow_call:
    inputs:
      production:
        description: 'Is this a production build?'
        default: false
        type: boolean
      ref:
        description: 'The ref to build from'
        default: ${{ github.ref }}
        type: string
    outputs:
      zip_name:
        description: "The name of the generated ZIP file"
        value: ${{ jobs.generate-zip.outputs.zip_name }}

jobs:
  generate-zip:
    runs-on: ubuntu-latest
    outputs:
      zip_name: ${{ env.ZIP_NAME }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_call' && inputs.ref || github.ref }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Install PHP production dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Build assets
        run: bun run build

      - name: Get version
        run: |
          VERSION=$(grep -oP "Version:\s*\K[0-9.]+" integration-workos.php)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Set zip name
        run: |
          if [ "${{ inputs.production }}" = "true" ]; then
            echo "ZIP_NAME=integration-workos-${{ env.VERSION }}" >> $GITHUB_ENV
          else
            echo "ZIP_NAME=integration-workos-${{ env.VERSION }}-dev-$(date +%Y%m%d)" >> $GITHUB_ENV
          fi

      - name: Create plugin directory
        run: |
          mkdir -p .plugin-zip/integration-workos
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.plugin-zip' \
            --exclude='phpunit.xml.dist' \
            --exclude='phpcs.xml.dist' \
            --exclude='.wp-env.json' \
            --exclude='.gitignore' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='bun.lock' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='codeception.yml' \
            --exclude='bin' \
            --exclude='src/css' \
            --exclude='src/js' \
            ./ .plugin-zip/integration-workos/

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: .plugin-zip/integration-workos/
