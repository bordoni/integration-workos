name: Release

on:
  release:
    types: [ published ]

jobs:
  build:
    name: Build & Upload Release Zip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install production dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Create zip
        run: |
          mkdir -p build
          zip -r build/workos-identity.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "node_modules/*" \
            -x "tests/*" \
            -x "phpunit.xml.dist" \
            -x "phpcs.xml.dist" \
            -x ".wp-env.json" \
            -x ".gitignore" \
            -x "package.json" \
            -x "package-lock.json" \
            -x "composer.lock" \
            -x "build/*"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/workos-identity.zip
